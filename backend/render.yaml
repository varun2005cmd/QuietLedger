services:
  - type: web
    name: quietledger-api
    env: python
    region: oregon
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: quietledger
      - key: ALLOWED_ORIGINS
        sync: false
